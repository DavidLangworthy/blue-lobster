name: Deploy OpenClaw to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-openclaw-main
  cancel-in-progress: false

env:
  AZD_ENV_NAME: ${{ vars.AZD_ENV_NAME || 'openclaw-prod' }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
  DEPLOY_AZURE_OPENAI: ${{ vars.DEPLOY_AZURE_OPENAI || 'true' }}
  DEPLOY_AZURE_OPENAI_MODEL: ${{ vars.DEPLOY_AZURE_OPENAI_MODEL || 'true' }}
  AZURE_OPENAI_ACCOUNT_NAME: ${{ vars.AZURE_OPENAI_ACCOUNT_NAME }}
  AZURE_OPENAI_SKU_NAME: ${{ vars.AZURE_OPENAI_SKU_NAME || 'S0' }}
  AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT || 'gpt-5-2' }}
  AZURE_OPENAI_MODEL_NAME: ${{ vars.AZURE_OPENAI_MODEL_NAME || 'gpt-4.1' }}
  AZURE_OPENAI_MODEL_VERSION: ${{ vars.AZURE_OPENAI_MODEL_VERSION || '2025-04-14' }}
  AZURE_OPENAI_DEPLOYMENT_SKU_NAME: ${{ vars.AZURE_OPENAI_DEPLOYMENT_SKU_NAME || 'Standard' }}
  AZURE_OPENAI_DEPLOYMENT_SKU_CAPACITY: ${{ vars.AZURE_OPENAI_DEPLOYMENT_SKU_CAPACITY || '1' }}
  AZURE_OPENAI_REASONING: ${{ vars.AZURE_OPENAI_REASONING || 'false' }}
  OPENCLAW_PERSONA_NAME: ${{ vars.OPENCLAW_PERSONA_NAME || 'Clawd' }}
  OPENCLAW_VERSION: ${{ vars.OPENCLAW_VERSION || 'main' }}
  IMAGE_TAG: ${{ vars.IMAGE_TAG || github.sha }}
  OPENCLAW_ROOMS: ${{ vars.OPENCLAW_ROOMS || 'living-room,master-bedroom' }}
  OPENCLAW_MODEL_FALLBACKS: ${{ vars.OPENCLAW_MODEL_FALLBACKS }}
  EXISTING_CONTAINER_REGISTRY_NAME: ${{ vars.EXISTING_CONTAINER_REGISTRY_NAME }}
  OPENCLAW_TTS_PROVIDER: ${{ vars.OPENCLAW_TTS_PROVIDER || 'edge' }}
  OPENCLAW_TTS_AUTO: ${{ vars.OPENCLAW_TTS_AUTO || 'inbound' }}
  OPENCLAW_CONTROLUI_DISABLE_DEVICE_AUTH: ${{ vars.OPENCLAW_CONTROLUI_DISABLE_DEVICE_AUTH || 'true' }}
  AZURE_SPEECH_LANGUAGE: ${{ vars.AZURE_SPEECH_LANGUAGE || 'en-US' }}
  USE_OFFICIAL_IMAGE: ${{ vars.USE_OFFICIAL_IMAGE || 'false' }}
  SCALE_POLLING_INTERVAL_SECONDS: ${{ vars.SCALE_POLLING_INTERVAL_SECONDS || '30' }}
  SCALE_COOLDOWN_SECONDS: ${{ vars.SCALE_COOLDOWN_SECONDS || '3600' }}
  HEARTBEAT_CRON_START: ${{ vars.HEARTBEAT_CRON_START || '0 8-20 * * *' }}
  HEARTBEAT_CRON_END: ${{ vars.HEARTBEAT_CRON_END || '5 8-20 * * *' }}
  HEARTBEAT_CRON_TIMEZONE: ${{ vars.HEARTBEAT_CRON_TIMEZONE || 'America/Los_Angeles' }}
  IMAP_HOST: ${{ vars.IMAP_HOST || 'outlook.office365.com' }}
  IMAP_PORT: ${{ vars.IMAP_PORT || '993' }}
  SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.office365.com' }}
  SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
  ENABLE_ALERTS: ${{ vars.ENABLE_ALERTS || 'false' }}
  INTERNAL_ONLY: ${{ vars.INTERNAL_ONLY || 'false' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        uses: azure/setup-azd@v2

      - name: Login azd with federated credentials
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-credential-provider github \
            --no-prompt

      - name: Initialize azd environment
        shell: bash
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          WHATSAPP_ALLOW_FROM: ${{ secrets.WHATSAPP_ALLOW_FROM }}
          WHATSAPP_DM_POLICY: ${{ vars.WHATSAPP_DM_POLICY }}
          WHATSAPP_GROUP_POLICY: ${{ vars.WHATSAPP_GROUP_POLICY }}
          OUTLOOK_EMAIL: ${{ secrets.OUTLOOK_EMAIL }}
          OUTLOOK_APP_PASSWORD: ${{ secrets.OUTLOOK_APP_PASSWORD }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          OPENCLAW_MODEL: ${{ vars.OPENCLAW_MODEL }}
          ALLOWED_IP_RANGES: ${{ vars.ALLOWED_IP_RANGES }}
          ALERT_EMAIL_ADDRESS: ${{ vars.ALERT_EMAIL_ADDRESS }}
        run: |
          set -euo pipefail

          ensure_required() {
            local name="$1"
            local value="$2"
            if [ -z "${value}" ]; then
              echo "Missing required value: ${name}" >&2
              exit 1
            fi
          }

          set_if_present() {
            local name="$1"
            local value="$2"
            if [ -n "${value}" ]; then
              azd env set "${name}" "${value}"
            fi
          }

          if azd env select "${AZD_ENV_NAME}" >/dev/null 2>&1; then
            echo "Using existing azd env '${AZD_ENV_NAME}'"
          else
            azd env new "${AZD_ENV_NAME}" --no-prompt
          fi

          ensure_required "OPENCLAW_GATEWAY_TOKEN" "${OPENCLAW_GATEWAY_TOKEN}"

          has_external_aoai=false
          if [ -n "${AZURE_OPENAI_ENDPOINT}" ] && [ -n "${AZURE_OPENAI_API_KEY}" ]; then
            has_external_aoai=true
          elif [ -n "${AZURE_OPENAI_ENDPOINT}" ] || [ -n "${AZURE_OPENAI_API_KEY}" ]; then
            echo "WARN: ignoring partial AOAI override (set both AZURE_OPENAI_ENDPOINT and AZURE_OPENAI_API_KEY)."
          fi

          azd env set AZURE_LOCATION "${AZURE_LOCATION}"
          azd env set AZURE_SUBSCRIPTION_ID "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          azd env set AZURE_TENANT_ID "${{ secrets.AZURE_TENANT_ID }}"
          azd env set DEPLOY_AZURE_OPENAI "${DEPLOY_AZURE_OPENAI}"
          azd env set DEPLOY_AZURE_OPENAI_MODEL "${DEPLOY_AZURE_OPENAI_MODEL}"
          azd env set AZURE_OPENAI_SKU_NAME "${AZURE_OPENAI_SKU_NAME}"
          azd env set AZURE_OPENAI_DEPLOYMENT "${AZURE_OPENAI_DEPLOYMENT}"
          azd env set AZURE_OPENAI_MODEL_NAME "${AZURE_OPENAI_MODEL_NAME}"
          azd env set AZURE_OPENAI_MODEL_VERSION "${AZURE_OPENAI_MODEL_VERSION}"
          azd env set AZURE_OPENAI_DEPLOYMENT_SKU_NAME "${AZURE_OPENAI_DEPLOYMENT_SKU_NAME}"
          azd env set AZURE_OPENAI_DEPLOYMENT_SKU_CAPACITY "${AZURE_OPENAI_DEPLOYMENT_SKU_CAPACITY}"
          azd env set AZURE_OPENAI_REASONING "${AZURE_OPENAI_REASONING}"
          azd env set OPENCLAW_PERSONA_NAME "${OPENCLAW_PERSONA_NAME}"
          azd env set IMAGE_TAG "${IMAGE_TAG}"
          azd env set OPENCLAW_ROOMS "${OPENCLAW_ROOMS}"
          azd env set OPENCLAW_TTS_PROVIDER "${OPENCLAW_TTS_PROVIDER}"
          azd env set OPENCLAW_TTS_AUTO "${OPENCLAW_TTS_AUTO}"
          azd env set OPENCLAW_CONTROLUI_DISABLE_DEVICE_AUTH "${OPENCLAW_CONTROLUI_DISABLE_DEVICE_AUTH}"
          azd env set AZURE_SPEECH_LANGUAGE "${AZURE_SPEECH_LANGUAGE}"
          azd env set USE_OFFICIAL_IMAGE "${USE_OFFICIAL_IMAGE}"
          azd env set SCALE_POLLING_INTERVAL_SECONDS "${SCALE_POLLING_INTERVAL_SECONDS}"
          azd env set SCALE_COOLDOWN_SECONDS "${SCALE_COOLDOWN_SECONDS}"
          azd env set HEARTBEAT_CRON_START "${HEARTBEAT_CRON_START}"
          azd env set HEARTBEAT_CRON_END "${HEARTBEAT_CRON_END}"
          azd env set HEARTBEAT_CRON_TIMEZONE "${HEARTBEAT_CRON_TIMEZONE}"
          azd env set IMAP_HOST "${IMAP_HOST}"
          azd env set IMAP_PORT "${IMAP_PORT}"
          azd env set SMTP_HOST "${SMTP_HOST}"
          azd env set SMTP_PORT "${SMTP_PORT}"
          azd env set ENABLE_ALERTS "${ENABLE_ALERTS}"
          azd env set INTERNAL_ONLY "${INTERNAL_ONLY}"

          if [ "${has_external_aoai}" = "true" ]; then
            azd env set AZURE_OPENAI_ENDPOINT "${AZURE_OPENAI_ENDPOINT}"
            azd env set AZURE_OPENAI_API_KEY "${AZURE_OPENAI_API_KEY}"
          else
            azd env set AZURE_OPENAI_ENDPOINT ""
            azd env set AZURE_OPENAI_API_KEY ""
          fi

          if [ -n "${ANTHROPIC_API_KEY}" ]; then
            azd env set OPENCLAW_MODEL_FALLBACKS "${OPENCLAW_MODEL_FALLBACKS}"
            azd env set ANTHROPIC_API_KEY "${ANTHROPIC_API_KEY}"
          else
            azd env set OPENCLAW_MODEL_FALLBACKS ""
            azd env set ANTHROPIC_API_KEY ""
          fi

          set_if_present AZURE_OPENAI_ACCOUNT_NAME "${AZURE_OPENAI_ACCOUNT_NAME}"
          set_if_present EXISTING_CONTAINER_REGISTRY_NAME "${EXISTING_CONTAINER_REGISTRY_NAME}"
          set_if_present OPENCLAW_GATEWAY_TOKEN "${OPENCLAW_GATEWAY_TOKEN}"
          set_if_present WHATSAPP_ALLOW_FROM "${WHATSAPP_ALLOW_FROM}"
          set_if_present WHATSAPP_DM_POLICY "${WHATSAPP_DM_POLICY}"
          set_if_present WHATSAPP_GROUP_POLICY "${WHATSAPP_GROUP_POLICY}"
          set_if_present OUTLOOK_EMAIL "${OUTLOOK_EMAIL}"
          set_if_present OUTLOOK_APP_PASSWORD "${OUTLOOK_APP_PASSWORD}"
          set_if_present AZURE_SPEECH_KEY "${AZURE_SPEECH_KEY}"
          set_if_present AZURE_SPEECH_REGION "${AZURE_SPEECH_REGION}"
          set_if_present ELEVENLABS_API_KEY "${ELEVENLABS_API_KEY}"
          set_if_present OPENCLAW_MODEL "${OPENCLAW_MODEL}"
          set_if_present ALLOWED_IP_RANGES "${ALLOWED_IP_RANGES}"
          set_if_present ALERT_EMAIL_ADDRESS "${ALERT_EMAIL_ADDRESS}"

      - name: Provision + Deploy
        shell: bash
        run: |
          set -euo pipefail
          export SKIP_IMAGE_BUILD=true

          normalize_value() {
            local raw="$1"
            raw="${raw%\"}"
            raw="${raw#\"}"
            if [ "${raw}" = "''" ] || [ "${raw}" = "\"\"" ] || [ "${raw}" = "null" ]; then
              raw=""
            fi
            printf '%s' "${raw}"
          }

          image_tag="${IMAGE_TAG}"
          has_image_tag=false
          acr_name="${EXISTING_CONTAINER_REGISTRY_NAME:-}"
          app_exists=false
          rg_name="$(azd env get-value AZURE_RESOURCE_GROUP --environment "${AZD_ENV_NAME}" 2>/dev/null || true)"
          rg_name="$(normalize_value "${rg_name}")"
          if [ -z "${rg_name}" ]; then
            rg_name="rg-${AZD_ENV_NAME}"
          fi

          azd env set IMAGE_TAG "${image_tag}" --environment "${AZD_ENV_NAME}"
          azd env set USE_OFFICIAL_IMAGE "false" --environment "${AZD_ENV_NAME}"

          if [ -z "${acr_name}" ]; then
            acr_name="$(azd env get-value CONTAINER_REGISTRY_NAME --environment "${AZD_ENV_NAME}" 2>/dev/null || true)"
            acr_name="$(normalize_value "${acr_name}")"
          fi

          if [ -z "${acr_name}" ]; then
            acr_name="$(az acr list -g "${rg_name}" --query "[0].name" -o tsv 2>/dev/null || true)"
            acr_name="$(normalize_value "${acr_name}")"
          fi

          if az containerapp show -g "${rg_name}" -n openclaw >/dev/null 2>&1; then
            app_exists=true
          fi

          if [ -z "${acr_name}" ] && [ "${app_exists}" = "true" ]; then
            current_image="$(az containerapp show -g "${rg_name}" -n openclaw --query "properties.template.containers[0].image" -o tsv 2>/dev/null || true)"
            current_image="$(normalize_value "${current_image}")"
            if [[ "${current_image}" == *.azurecr.io/* ]]; then
              acr_name="${current_image%%.azurecr.io/*}"
            fi
          fi

          if [ -n "${acr_name}" ]; then
            tag_count="$(az acr repository show-tags --name "${acr_name}" --repository clawdbot --query "[?@=='${image_tag}'] | length(@)" -o tsv 2>/dev/null || echo "0")"
            if [ "${tag_count}" = "1" ]; then
              has_image_tag=true
            fi
          fi

          if [ -z "${acr_name}" ] && [ "${app_exists}" = "false" ]; then
            echo "First-time bootstrap: no ACR/app found, provisioning once with official image"
            azd env set USE_OFFICIAL_IMAGE "true" --environment "${AZD_ENV_NAME}"
            azd provision --environment "${AZD_ENV_NAME}" --no-prompt
            azd env set USE_OFFICIAL_IMAGE "false" --environment "${AZD_ENV_NAME}"
            acr_name="$(azd env get-value CONTAINER_REGISTRY_NAME --environment "${AZD_ENV_NAME}" 2>/dev/null || true)"
            has_image_tag=false
          fi

          if [ -z "${acr_name}" ]; then
            echo "ERROR: could not resolve ACR name for custom image deployment." >&2
            exit 1
          fi

          if [ "${has_image_tag}" != "true" ]; then
            echo "Building custom image clawdbot:${image_tag} in ACR ${acr_name}"
            ./scripts/build-image.sh "${acr_name}" "${image_tag}" "${OPENCLAW_VERSION}"
          fi

          echo "Deploying custom ACR image tag ${image_tag}"
          azd env set USE_OFFICIAL_IMAGE "false" --environment "${AZD_ENV_NAME}"
          azd provision --environment "${AZD_ENV_NAME}" --no-prompt

      - name: AOAI liveness probe
        shell: bash
        env:
          AZURE_OPENAI_API_KEY_OVERRIDE: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          rg_name="$(azd env get-value AZURE_RESOURCE_GROUP --environment "${AZD_ENV_NAME}" 2>/dev/null || true)"
          endpoint="$(azd env get-value AZURE_OPENAI_ENDPOINT --environment "${AZD_ENV_NAME}" 2>/dev/null || true)"
          deployment="$(azd env get-value AZURE_OPENAI_DEPLOYMENT --environment "${AZD_ENV_NAME}" 2>/dev/null || true)"
          api_key="${AZURE_OPENAI_API_KEY_OVERRIDE:-}"

          if [ -z "${api_key}" ]; then
            account_name="$(azd env get-value AZURE_OPENAI_ACCOUNT_NAME --environment "${AZD_ENV_NAME}" 2>/dev/null || true)"
            if [ -n "${account_name}" ] && [ -n "${rg_name}" ]; then
              api_key="$(az cognitiveservices account keys list -g "${rg_name}" -n "${account_name}" --query key1 -o tsv 2>/dev/null || true)"
            fi
          fi

          if [ -z "${endpoint}" ] || [ -z "${deployment}" ] || [ -z "${api_key}" ]; then
            echo "Skipping AOAI liveness probe (missing endpoint, deployment, or key)."
            exit 0
          fi

          ./scripts/aoai-liveness.sh \
            --endpoint "${endpoint}" \
            --api-key "${api_key}" \
            --deployment "${deployment}"
